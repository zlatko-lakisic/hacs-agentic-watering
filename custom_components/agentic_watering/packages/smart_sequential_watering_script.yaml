script:
  ai_sequential_watering:
    alias: AI Sequential Watering
    description: >-
      Generic sequential AI irrigation pipeline: weather APIs, Recorder history, LLM per zone,
      then irrigation start/stop services. All zones, sensors, helpers, and API endpoints are
      passed as script fields (typically from the smart_sequential_watering blueprint).
    fields:
      zones:
        name: Irrigation zones
        required: true
        selector:
          object:
            multiple: true
      latitude:
        name: Latitude
        required: true
        selector:
          number:
            min: -90
            max: 90
            step: any
            mode: box
      longitude:
        name: Longitude
        required: true
        selector:
          number:
            min: -180
            max: 180
            step: any
            mode: box
      timezone:
        name: Timezone
        required: true
        selector:
          text:
      garden_temperature_sensor:
        name: Garden temperature sensor
        required: true
        selector:
          entity:
            filter:
              - domain: sensor
      garden_dewpoint_sensor:
        name: Garden dew point sensor
        required: false
        selector:
          entity:
            filter:
              - domain: sensor
      history_sensors:
        name: History sensors (24h)
        required: true
        selector:
          entity:
            multiple: true
            filter:
              - domain: sensor
      weather_entity:
        name: Weather entity
        required: false
        selector:
          entity:
            filter:
              - domain: weather
      precipitation_sensor:
        name: Precipitation sensor
        required: false
        selector:
          entity:
            filter:
              - domain: sensor
      soil_moisture_legend:
        name: Soil moisture legend
        required: false
        selector:
          text:
            multiline: true
      model_override:
        name: LLM model override
        required: false
        default: ""
        selector:
          text:
      in_progress_boolean:
        name: In-progress helper
        required: true
        selector:
          entity:
            filter:
              - domain: input_boolean
      next_index_number:
        name: Next zone index helper
        required: true
        selector:
          entity:
            filter:
              - domain: input_number
      active_run_id_text:
        name: Active run id helper
        required: true
        selector:
          entity:
            filter:
              - domain: input_text
      simulate_report_text:
        name: Simulate report helper
        required: false
        selector:
          entity:
            filter:
              - domain: input_text
      run_config_snapshot_sensor:
        name: Run config snapshot sensor
        required: true
        selector:
          entity:
            filter:
              - domain: sensor
      mqtt_snapshot_topic:
        name: MQTT snapshot topic
        required: true
        selector:
          text:
      default_llm_model_helper:
        name: Default LLM model helper
        required: false
        selector:
          entity:
            filter:
              - domain: input_select
      default_llm_model:
        name: Default LLM model (fallback text)
        required: false
        default: ""
        selector:
          text:
      openweathermap_api_key_helper:
        name: OpenWeatherMap API key helper
        required: true
        selector:
          entity:
            filter:
              - domain: input_text
      ha_api_token_helper:
        name: HA Recorder API token helper
        required: true
        selector:
          entity:
            filter:
              - domain: input_text
      llm_api_key_helper:
        name: LLM API key helper
        required: true
        selector:
          entity:
            filter:
              - domain: input_text
      llm_api_url:
        name: LLM chat completions URL
        required: true
        selector:
          text:
      plant_knowledge_climate_setting:
        name: Plant-knowledge climate_setting when live ET0 is unavailable
        required: false
        default: temperate_humid
        selector:
          text:
      ha_api_base_url:
        name: HA API base URL
        required: true
        selector:
          text:
      irrigation_start_service:
        name: Irrigation start service
        description: domain.service (e.g. bhyve.start_watering)
        required: true
        selector:
          text:
      irrigation_stop_service:
        name: Irrigation stop service
        required: true
        selector:
          text:
      max_zone_index:
        name: Max zone index
        required: false
        default: 16
        selector:
          number:
            min: 1
            max: 64
            mode: box
      simulate:
        name: Simulate (skip valve watering only)
        required: false
        default: false
        selector:
          boolean:
      start_index:
        name: Start index
        required: false
        default: 1
        selector:
          number:
            min: 1
            max: 64
            mode: box
    mode: queued
    max: 2
    sequence:
    - variables:
        simulate_mode: '{{ simulate | default(false) | bool }}'
        start_index_raw: '{{ start_index | default(1) | int(1) }}'
    - variables:
        cfg_in_progress: "{{ in_progress_boolean | default('', true) | trim }}"
        cfg_next_index: "{{ next_index_number | default('', true) | trim }}"
        cfg_active_run_id: "{{ active_run_id_text | default('', true) | trim }}"
        cfg_simulate_report: "{{ simulate_report_text | default('', true) | trim }}"
        cfg_snapshot_sensor: "{{ run_config_snapshot_sensor | default('', true) | trim }}"
        cfg_mqtt_topic: "{{ mqtt_snapshot_topic | default('', true) | trim }}"
        cfg_llm_helper: "{{ default_llm_model_helper | default('', true) | trim }}"
        cfg_default_llm: "{{ default_llm_model | default('', true) | trim }}"
        cfg_owm_key_helper: "{{ openweathermap_api_key_helper | default('', true) | trim }}"
        cfg_ha_token_helper: "{{ ha_api_token_helper | default('', true) | trim }}"
        cfg_llm_key_helper: "{{ llm_api_key_helper | default('', true) | trim }}"
        cfg_llm_url: "{{ llm_api_url | default('', true) | trim }}"
        cfg_plant_knowledge_climate: "{{ plant_knowledge_climate_setting | default('temperate_humid', true) | trim }}"
        cfg_ha_api_base: "{{ (ha_api_base_url | default('http://127.0.0.1:8123', true) | trim) | regex_replace('/$', '') }}"
        cfg_irrigation_start: "{{ irrigation_start_service | default('', true) | trim }}"
        cfg_irrigation_stop: "{{ irrigation_stop_service | default('', true) | trim }}"
        cfg_max_zone_index: "{{ max_zone_index | default(16) | int(16) }}"
        cfg_owm_key: >-
          {% set h = cfg_owm_key_helper %}
          {% if h | length > 0 %}
            {{ states(h) | default('', true) | trim }}
          {% else %}
            {{ '' }}
          {% endif %}
        cfg_ha_auth: >-
          {% set h = cfg_ha_token_helper %}
          {% set t = states(h) | default('', true) | trim if h | length > 0 else '' %}
          {% if t not in ['', 'unknown', 'unavailable', 'none'] %}
            Bearer {{ t }}
          {% else %}
            {{ '' }}
          {% endif %}
    - variables:
        zones_configured: >-
          {% set raw = zones | default(none, true) %}
          {% if raw is string and raw | trim | length > 0 %}
            {% set raw = raw | trim | from_json(default=[]) %}
          {% endif %}
          {% if raw is sequence and raw is not string and raw | length > 0 %}
            {% set ns = namespace(items=[]) %}
            {% for z in raw %}
              {% set ns.items = ns.items + [{
                'label': z.label | default('', true) | trim,
                'entity_id': z.entity_id | default('', true) | trim,
                'zone_history_sensor': (z.zone_history_sensor | default(z.bhyve_zone_history_sensor, true) | default('', true) | trim),
                'area_sqm': z.area_sqm | default(none, true),
                'sun_exposure': z.sun_exposure | default('', true),
                'plant_profile': z.plant_profile | default('', true),
                'irrigation_hardware': z.irrigation_hardware | default('', true),
                'estimated_flow_gpm': z.estimated_flow_gpm | default('', true),
                'notes': z.notes | default('', true),
                'soil_sensor': z.soil_sensor | default('', true) | trim,
                'soil_sensor_secondary': z.soil_sensor_secondary | default('', true) | trim
              }] %}
            {% endfor %}
            {{ ns.items }}
          {% else %}
            []
          {% endif %}
        zone_count: '{{ zones_configured | length }}'
        start_index_clamped: >-
          {% set zc = zone_count | int(0) %}
          {% if zc < 1 %}
            1
          {% else %}
            {{ [1, [start_index_raw, zc] | min] | max }}
          {% endif %}
    - if:
      - condition: template
        value_template: "{{ zone_count | int(0) < 1 }}"
      then:
        - action: persistent_notification.create
          data:
            title: AI watering — no zones
            message: >-
              No irrigation zones were passed to script.ai_sequential_watering.
              Configure zones in the Smart sequential watering blueprint automation, then run that automation
              (or pass a zones list when calling this script).
        - stop: No irrigation zones configured
    - variables:
        cfg_latitude: "{{ latitude | default(none, true) }}"
        cfg_longitude: "{{ longitude | default(none, true) }}"
        cfg_timezone: "{{ timezone | default('UTC', true) | trim }}"
        cfg_garden_temperature_sensor: "{{ garden_temperature_sensor | default('', true) | trim }}"
        cfg_garden_dewpoint_sensor: "{{ garden_dewpoint_sensor | default('', true) | trim }}"
        cfg_weather_entity: "{{ weather_entity | default('', true) | trim }}"
        cfg_precipitation_sensor: "{{ precipitation_sensor | default('', true) | trim }}"
        cfg_soil_moisture_legend: "{{ soil_moisture_legend | default('', true) }}"
        model_override_trimmed: '{{ (model_override | default("", true) | trim) }}'
        cfg_history_sensors: >-
          {% set raw = history_sensors | default([], true) %}
          {% if raw is string and raw | trim | length > 0 %}
            {% set raw = raw | trim | from_json(default=[]) %}
          {% endif %}
          {% if raw is not sequence or raw is string %}
            {% set raw = [] %}
          {% endif %}
          {% set ns = namespace(ids=[]) %}
          {% for eid in raw %}
            {% if eid is string and eid | trim | length > 0 and (eid | trim) not in ns.ids %}
              {% set ns.ids = ns.ids + [eid | trim] %}
            {% endif %}
          {% endfor %}
          {% for z in zones_configured %}
            {% for key in ['soil_sensor', 'soil_sensor_secondary'] %}
              {% set e = z[key] | default('', true) | trim %}
              {% if e | length > 0 and e not in ns.ids %}
                {% set ns.ids = ns.ids + [e] %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set gt = garden_temperature_sensor | default('', true) | trim %}
          {% set gd = garden_dewpoint_sensor | default('', true) | trim %}
          {% if gt | length > 0 and gt not in ns.ids %}
            {% set ns.ids = ns.ids + [gt] %}
          {% endif %}
          {% if gd | length > 0 and gd not in ns.ids %}
            {% set ns.ids = ns.ids + [gd] %}
          {% endif %}
          {{ ns.ids }}
        history_entity_ids: "{{ cfg_history_sensors | join(',') }}"
        valve_entity_ids: >-
          {% set ns = namespace(ids=[]) %}
          {% for z in zones_configured %}
            {% set e = z.entity_id | default('', true) | trim %}
            {% if e | length > 0 and e not in ns.ids %}
              {% set ns.ids = ns.ids + [e] %}
            {% endif %}
          {% endfor %}
          {{ ns.ids | join(',') }}
    - if:
      - condition: template
        value_template: >-
          {{ cfg_latitude is none or cfg_longitude is none
             or cfg_garden_temperature_sensor | length < 1
             or history_entity_ids | trim | length < 1
             or valve_entity_ids | trim | length < 1
             or cfg_in_progress | length < 1
             or cfg_next_index | length < 1
             or cfg_active_run_id | length < 1
             or cfg_mqtt_topic | length < 1
             or cfg_snapshot_sensor | length < 1
             or cfg_owm_key_helper | length < 1
             or cfg_ha_token_helper | length < 1
             or cfg_llm_key_helper | length < 1
             or cfg_llm_url | length < 1
             or cfg_ha_api_base | length < 1
             or cfg_irrigation_start | length < 1
             or cfg_irrigation_stop | length < 1 }}
      then:
        - action: persistent_notification.create
          data:
            title: AI watering — incomplete config
            message: >-
              Missing required script inputs (location, sensors, zone valves, runtime helpers,
              MQTT topic, API helpers/URLs, or irrigation services). Configure them in the blueprint automation.
        - stop: Incomplete watering configuration from blueprint
    - variables:
        zones: "{{ zones_configured }}"
        ecowitt_temp: '{{ states(cfg_garden_temperature_sensor) }}'
        ecowitt_dewpoint: >-
          {% if cfg_garden_dewpoint_sensor | length > 0 %}
            {{ states(cfg_garden_dewpoint_sensor) }}
          {% else %}
            unknown
          {% endif %}
        ollama_chat_model: >-
          {% if model_override_trimmed | length > 0 %}
            {{ model_override_trimmed }}
          {% elif cfg_llm_helper | length > 0 %}
            {% set h = states(cfg_llm_helper) | default('', true) | trim %}
            {% if h not in ['unknown', 'unavailable', 'none', ''] %}
              {{ h }}
            {% else %}
              {{ cfg_default_llm }}
            {% endif %}
          {% else %}
            {{ cfg_default_llm }}
          {% endif %}
    - variables:
        owm_response: {}
        meteo_past_response: {}
        ha_history_response: {}
        ha_valve_history_response: {}
    - action: rest_command.openweathermap_5day_forecast
      continue_on_error: true
      data:
        api_key: "{{ cfg_owm_key }}"
        latitude: "{{ cfg_latitude }}"
        longitude: "{{ cfg_longitude }}"
      response_variable: owm_response
    - action: rest_command.open_meteo_precipitation_past_24h
      continue_on_error: true
      data:
        latitude: "{{ cfg_latitude }}"
        longitude: "{{ cfg_longitude }}"
        timezone: "{{ cfg_timezone }}"
      response_variable: meteo_past_response
    - action: rest_command.homeassistant_history_garden_24h
      continue_on_error: true
      data:
        ha_api_base_url: "{{ cfg_ha_api_base }}"
        authorization: "{{ cfg_ha_auth }}"
        history_entity_ids: "{{ history_entity_ids }}"
      response_variable: ha_history_response
    - action: rest_command.homeassistant_history_irrigation_valves
      continue_on_error: true
      data:
        ha_api_base_url: "{{ cfg_ha_api_base }}"
        authorization: "{{ cfg_ha_auth }}"
        valve_entity_ids: "{{ valve_entity_ids }}"
      response_variable: ha_valve_history_response
    - variables:
        accuweather_hourly_response: {}
    - if:
      - condition: template
        value_template: >-
          {{ cfg_weather_entity | length > 0
             and states(cfg_weather_entity) not in ['unknown', 'unavailable', ''] }}
      then:
        - action: weather.get_forecasts
          continue_on_error: true
          target:
            entity_id: "{{ cfg_weather_entity }}"
          data:
            type: hourly
          response_variable: accuweather_hourly_response
    - variables:
        # Parse OpenWeather response once here — do not store JSON then |from_json again (HA wraps/chokes on round-trip).
        forecast_short: >-
          {% set raw = owm_response.content | default(none) %}
          {% set owm = raw if raw is mapping else (raw | trim | from_json(default={}) if raw is string and raw | trim else {}) %}
          {% set forecast_items = owm.list | default([]) %}
          {% set ns = namespace(items=[]) %}
          {% for f in forecast_items[:8] %}
            {% set main = f.main if f.main is defined else {} %}
            {% set ns.items = ns.items + [{
              'time': f.dt_txt | default('', true),
              'temp_f': main.temp | default(none, true) if main is mapping else none,
              'humidity_pct': main.humidity | default(none, true) if main is mapping else none,
              'weather': (f.weather[0].description if f.weather is defined and f.weather | count > 0 else ''),
              'rain_mm_3h': (f.rain['3h'] if f.rain is defined and f.rain['3h'] is defined else 0)
            }] %}
          {% endfor %}
          {{ ns.items | to_json }}
        accuweather_forecast_for_llm: >-
          {% set wid = cfg_weather_entity | default('', true) | trim %}
          {% if wid | length < 1 %}
          {{ {'weather_provider': 'none'} | to_json }}
          {% else %}
          {% set cur = states(wid) %}
          {% set resp = accuweather_hourly_response | default({}, true) %}
          {% set nsf = namespace(fc=[]) %}
          {% if resp is mapping and wid in resp %}
            {% set inner = resp[wid] %}
            {% if inner is mapping and 'forecast' in inner %}
              {% set cand = inner['forecast'] %}
              {% if cand is sequence and cand is not string and cand | length > 0 %}
                {% set nsf.fc = cand %}
              {% endif %}
            {% endif %}
          {% endif %}
          {% if nsf.fc | length == 0 %}
            {% set attr_fc = state_attr(wid, 'forecast') %}
            {% if attr_fc is sequence and attr_fc is not string and attr_fc | length > 0 %}
              {% set nsf.fc = attr_fc %}
            {% endif %}
          {% endif %}
          {% set ns = namespace(rows=[]) %}
          {% if nsf.fc is sequence and nsf.fc is not string %}
            {% for row in nsf.fc[:20] %}
              {% if row is mapping %}
                {% set ns.rows = ns.rows + [{
                  't': (row.datetime | default(row.dt, true)) | string,
                  'c': (row.condition | default('', true)) | string,
                  'pop': row.precipitation_probability | default(none),
                  'mm': row.precipitation | default(none)
                }] %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {% set precip = 'unknown' %}
          {% if cfg_precipitation_sensor | length > 0 %}
            {% set precip = states(cfg_precipitation_sensor) %}
          {% endif %}
          {{
            {
              'weather_provider': wid,
              'now_condition': cur,
              'next_hours': ns.rows,
              'precip_rate_in_per_h': precip
            } | to_json
          }}
          {% endif %}
        open_meteo_past_rain_for_llm: >-
          {% set raw = meteo_past_response.content | default('') %}
          {% set st = meteo_past_response.status | default(0) %}
          {% if st != 200 %}
          {{ {'error': 'open_meteo_http_' ~ st} | to_json }}
          {% else %}
          {% set j = raw if raw is mapping else (raw | trim | from_json(default={}) if raw is string and raw | trim else {}) %}
          {% set hourly = j.get('hourly', {}) if j is mapping else {} %}
          {% set times = hourly.get('time') if hourly is mapping else none %}
          {% set precs = hourly.get('precipitation') if hourly is mapping else none %}
          {% if times is string or times is not sequence %}
            {% set times = [] %}
          {% endif %}
          {% if precs is string or precs is not sequence %}
            {% set precs = [] %}
          {% endif %}
          {% set ns = namespace(total=0.0, mx=0.0, hourly=[]) %}
          {% set cnt = [times | length, precs | length] | min %}
          {% for i in range(cnt) %}
            {% set p = precs[i] | float(0) %}
            {% set ns.total = ns.total + p %}
            {% if p > ns.mx %}
              {% set ns.mx = p %}
            {% endif %}
            {% set ns.hourly = ns.hourly + [{'t': times[i], 'mm': (precs[i] | float(0)) | round(3)}] %}
          {% endfor %}
          {{
            {
              'dataset': 'open_meteo_hourly_grid',
              'hours': cnt,
              'precipitation_mm_sum': ns.total | round(3),
              'max_hourly_precipitation_mm': ns.mx | round(3),
              'rained_in_past_72h_estimate': ns.total >= 0.1,
              'hourly_mm': ns.hourly
            } | to_json
          }}
          {% endif %}
        sensor_history_24h_for_llm: >-
          {% set raw = ha_history_response.content | default('') %}
          {% set st = ha_history_response.status | default(0) %}
          {% if st != 200 %}
          {{
            {
              'error': 'recorder_history_http_' ~ st,
              'hint': 'Configure a long-lived access token in the HA API token helper passed to this script.'
            } | to_json
          }}
          {% else %}
          {% set outer = raw | trim | from_json(default=[]) %}
          {% set accum = namespace(items=[]) %}
          {% for series in outer %}
            {% if series | length > 0 %}
              {% set eid = series[0].entity_id | default('', true) %}
              {% set ns = namespace(minv=none, maxv=none, samples=[]) %}
              {% set n = series | length %}
              {% set stride = ([((n - 1) / 71) | round(0,'ceil') | int, 1] | max) if n > 72 else 1 %}
              {% for pt in series %}
                {% set fv = pt.state | float(none) %}
                {% if fv is not none %}
                  {% if ns.minv is none or fv < ns.minv %}
                    {% set ns.minv = fv %}
                  {% endif %}
                  {% if ns.maxv is none or fv > ns.maxv %}
                    {% set ns.maxv = fv %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {% for pt in series %}
                {% if loop.first or loop.last or ((not loop.first) and (not loop.last) and (loop.index0 % stride == 0)) %}
                  {% set ns.samples = ns.samples + [{'t': pt.last_changed | default(pt.last_updated), 'state': pt.state}] %}
                {% endif %}
              {% endfor %}
              {% set fc = series[0].state %}
              {% set lc = series[-1].state %}
              {% set accum.items = accum.items + [{
                'entity_id': eid,
                'points': n,
                'first': fc,
                'last': lc,
                'min_numeric': ns.minv,
                'max_numeric': ns.maxv,
                'samples': ns.samples
              }] %}
            {% endif %}
          {% endfor %}
          {{
            {
              'period_hours': 24,
              'recorder_end': now().isoformat(),
              'soil_moisture_index': cfg_soil_moisture_legend | default('', true),
              'entities': accum.items
            } | to_json
          }}
          {% endif %}
        valve_last_watering_for_llm: >-
          {% set raw = ha_valve_history_response.content | default('') %}
          {% set st = ha_valve_history_response.status | default(0) %}
          {% if st != 200 %}
          {{ {'error': 'valve_history_http_' ~ st} | to_json }}
          {% else %}
          {% set outer = raw | trim | from_json(default=[]) %}
          {% set root = namespace(rows=[]) %}
          {% for series in outer %}
            {% if series | length > 0 %}
              {% set eid = series[0].entity_id | default('', true) %}
              {% set L = series | length %}
              {% set win = namespace(start=none, end=none, mins=none, note='') %}
              {% if L >= 2 %}
                {% for j in range(L - 1) %}
                  {% set s0 = series[j].state | lower | trim %}
                  {% set s1 = series[j + 1].state | lower | trim %}
                  {% if (s0 in ['open', 'on', 'opening']) and (s1 in ['closed', 'off', 'closing']) %}
                    {% set win.start = series[j].last_changed | default(series[j].last_updated, true) %}
                    {% set win.end = series[j + 1].last_changed | default(series[j + 1].last_updated, true) %}
                  {% endif %}
                {% endfor %}
                {% if win.start is not none and win.end is not none %}
                  {% set win.mins = (((win.end | as_timestamp(0)) - (win.start | as_timestamp(0))) / 60) | round(1) %}
                {% endif %}
              {% endif %}
              {% if win.start is none and L >= 1 %}
                {% set sl = series[-1].state | lower | trim %}
                {% if sl in ['open', 'on', 'opening'] %}
                  {% set win.start = series[-1].last_changed | default(series[-1].last_updated, true) %}
                  {% set win.note = 'still_open_in_window_duration_vs_now_approximate' %}
                  {% set win.mins = (((now() | as_timestamp) - (win.start | as_timestamp(0))) / 60) | round(1) %}
                {% endif %}
              {% endif %}
              {% set root.rows = root.rows + [{
                'entity_id': eid,
                'last_watering_start': win.start,
                'last_watering_end': win.end,
                'last_watering_duration_minutes': win.mins,
                'note': win.note
              }] %}
            {% endif %}
          {% endfor %}
          {{ {'lookback_days': 30, 'valves': root.rows} | to_json }}
          {% endif %}
    - variables:
        # Separate step from forecast/history parsers — avoids LoggingUndefined if zone_context references garden_heat_temp_f.
        garden_heat_temp_f: >-
          {% set temp_now = ecowitt_temp | float(75) %}
          {% set hist = sensor_history_24h_for_llm | default('{}', true) | trim | from_json(default={}) %}
          {% set ns = namespace(mx=temp_now) %}
          {% for e in hist.entities | default([]) %}
            {% if e.entity_id == cfg_garden_temperature_sensor %}
              {% if e.max_numeric is not none %}
                {% set v = e.max_numeric | float(temp_now) %}
                {% if v > ns.mx %}
                  {% set ns.mx = v %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.mx | round(1) }}
        zone_context: >-
          {% set vw = valve_last_watering_for_llm | trim | from_json(default={'valves': []}) %}
          {% set vlist = vw.valves | default([]) %}
          {% set ns = namespace(items=[]) %}
          {% for z in zones %}
            {% set soil = states(z.soil_sensor) if z.soil_sensor else 'n/a' %}
            {% set sec_eid = z.soil_sensor_secondary | default('', true) | trim %}
            {% set soil_sec = states(sec_eid) if sec_eid else 'n/a' %}
            {% set bh = z.zone_history_sensor | default('', true) | trim %}
            {% set meta = namespace(v=none, src='none') %}
            {% if bh | length > 0 %}
              {% set st_raw = state_attr(bh, 'start_time') %}
              {% if not (st_raw is not none and st_raw | string | trim | length > 0 and st_raw | string | lower not in ['none', 'null', 'unknown', 'unavailable']) %}
                {% set st_ent = states(bh) %}
                {% if st_ent is not none and st_ent | string | trim | length > 0 and st_ent | string | lower not in ['none', 'null', 'unknown', 'unavailable'] %}
                  {% set st_raw = st_ent %}
                {% endif %}
              {% endif %}
              {% set rt_raw = state_attr(bh, 'run_time') %}
              {% set prog_nm = state_attr(bh, 'program_name') %}
              {% set prog_ltr = state_attr(bh, 'program') %}
              {% set stat = state_attr(bh, 'status') | default('', true) %}
              {% set gal = state_attr(bh, 'consumption_gallons') %}
              {% set lit = state_attr(bh, 'consumption_litres') %}
              {% set bud = state_attr(bh, 'budget') %}
              {% set has_st = st_raw is not none and st_raw | string | trim | length > 0 %}
              {% set has_rt = rt_raw is not none and rt_raw | string | trim | length > 0 and rt_raw | string | lower not in ['unknown', 'unavailable', 'none'] %}
              {% if has_st or has_rt %}
                {% set rt_num = rt_raw | float(none) if has_rt else none %}
                {% set note_str = 'orbit_bhyve_zone_history' %}
                {% if stat | trim | length > 0 %}
                  {% set note_str = note_str ~ '; status=' ~ stat %}
                {% endif %}
                {% if prog_nm is not none and prog_nm | string | trim | length > 0 %}
                  {% set note_str = note_str ~ '; program_name=' ~ prog_nm %}
                {% elif prog_ltr is not none and prog_ltr | string | trim | length > 0 %}
                  {% set note_str = note_str ~ '; program=' ~ prog_ltr %}
                {% endif %}
                {% if gal is not none %}
                  {% set note_str = note_str ~ '; consumption_gal=' ~ gal %}
                {% endif %}
                {% if lit is not none %}
                  {% set note_str = note_str ~ '; consumption_L=' ~ lit %}
                {% endif %}
                {% if bud is not none %}
                  {% set note_str = note_str ~ '; budget=' ~ bud %}
                {% endif %}
                {% set meta.v = {
                  'last_watering_start': (st_raw if has_st else none),
                  'last_watering_end': none,
                  'last_watering_duration_minutes': rt_num,
                  'note': note_str
                } %}
                {% set meta.src = 'orbit_bhyve' %}
              {% endif %}
            {% endif %}
            {% if meta.v is none %}
              {% for r in vlist %}
                {% if r.entity_id == z.entity_id %}
                  {% set meta.v = r %}
                  {% set meta.src = 'home_assistant_recorder' %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% set ns.items = ns.items + [{
              'label': z.label | default('', true),
              'entity_id': z.entity_id | default('', true),
              'area_sqm': z.area_sqm | default(none, true),
              'sun_exposure': z.sun_exposure | default('', true),
              'plant_profile': z.plant_profile | default('', true),
              'irrigation_hardware': z.irrigation_hardware | default('', true),
              'estimated_flow_gpm': z.estimated_flow_gpm | default('', true),
              'notes': z.notes | default('', true),
              'soil_sensor': z.soil_sensor | default('', true),
              'soil_moisture_pct': soil,
              'soil_sensor_secondary': sec_eid,
              'soil_moisture_secondary_pct': soil_sec if sec_eid else 'n/a',
              'zone_history_sensor': bh,
              'last_watering_source': meta.src,
              'ecowitt_temp_f': ecowitt_temp | default(none, true),
              'garden_heat_temp_f': garden_heat_temp_f | default(none, true),
              'ecowitt_dewpoint_f': ecowitt_dewpoint | default(none, true),
              'last_watering_start': meta.v.last_watering_start | default(none, true) if meta.v else none,
              'last_watering_end': meta.v.last_watering_end | default(none, true) if meta.v else none,
              'last_watering_duration_minutes': meta.v.last_watering_duration_minutes | default(none, true) if meta.v else none,
              'last_watering_note': meta.v.note | default('', true) if meta.v else ''
            }] %}
          {% endfor %}
          {{ ns.items | to_json }}
        recorder_rest_hints: >-
          {% set hs = ha_history_response.status | default(0) | int(0) %}
          {% set vs = ha_valve_history_response.status | default(0) | int(0) %}
          {% set parts = namespace(bits=[]) %}
          {% if hs != 200 %}
            {% set parts.bits = parts.bits + [
              'Garden/soil recorder HTTP ' ~ hs
              ~ ' — configure the HA API token helper passed to this script.'
            ] %}
          {% endif %}
          {% if vs != 200 %}
            {% set parts.bits = parts.bits + [
              'Valve last-watering recorder HTTP ' ~ vs
              ~ ' — same token (optional). Primary last run times come from Orbit: check last_watering_source and zone_history_sensor in zone_context.'
            ] %}
          {% endif %}
          {{ parts.bits | join(' ') }}
        baseline_zone_map: >-
          {% set temp_f = garden_heat_temp_f | float(ecowitt_temp | float(75)) %}
          {% set dew_f = ecowitt_dewpoint | float(55) %}
          {% set fs = forecast_short | default('[]', true) | trim | from_json(default=[]) %}
          {% set ns_mm = namespace(t=0.0) %}
          {% if fs is sequence %}
            {% for row in fs %}
              {% if row is mapping and row.rain_mm_3h is defined %}
                {% set ns_mm.t = ns_mm.t + (row.rain_mm_3h | float(0)) %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {% set rain_in = (ns_mm.t / 25.4) | round(3) %}
          {% set ns = namespace(m={}) %}
          {% for z in zones %}
            {% set base = 10 %}
            {% set sun = (z.sun_exposure | default('', true) | lower) %}
            {% set plants = (z.plant_profile | default('', true) | lower) %}
            {% if 'full sun' in sun %}
              {% set base = base + 2 %}
            {% elif 'shade' in sun %}
              {% set base = base - 2 %}
            {% endif %}
            {% if temp_f >= 95 %}
              {% set base = base + 7 %}
            {% elif temp_f >= 90 %}
              {% set base = base + 5 %}
            {% elif temp_f >= 85 %}
              {% set base = base + 4 %}
            {% elif temp_f >= 80 %}
              {% set base = base + 3 %}
            {% elif temp_f >= 75 %}
              {% set base = base + 2 %}
            {% elif temp_f >= 70 %}
              {% set base = base + 1 %}
            {% elif temp_f <= 58 %}
              {% set base = base - 2 %}
            {% elif temp_f <= 65 %}
              {% set base = base - 1 %}
            {% endif %}
            {% if dew_f <= 50 %}
              {% set base = base + 1 %}
            {% elif dew_f >= 68 %}
              {% set base = base - 1 %}
            {% endif %}
            {% if plants | regex_search('tomato|pepper|kale|zucchini|eggplant|pea|basil|parsley|rose|hosta|mint|lily|flower|corn') %}
              {% set base = base + 1 %}
            {% endif %}
            {% set soil_raw = states(z.soil_sensor) if z.soil_sensor else 'unknown' %}
            {% if soil_raw not in ['unknown', 'unavailable', 'none', ''] %}
              {% set soil = soil_raw | float(0) %}
              {% if soil <= 20 %}
                {% set base = base + 5 %}
              {% elif soil <= 30 %}
                {% set base = base + 3 %}
              {% elif soil <= 40 %}
                {% set base = base + 1 %}
              {% elif soil >= 70 %}
                {% if temp_f >= 80 %}
                  {% set base = base - 2 %}
                {% else %}
                  {% set base = base - 4 %}
                {% endif %}
              {% elif soil >= 55 %}
                {% if temp_f >= 75 %}
                  {% set base = base - 1 %}
                {% else %}
                  {% set base = base - 2 %}
                {% endif %}
              {% endif %}
            {% endif %}
            {% if rain_in >= 0.30 %}
              {% set base = base - 4 %}
            {% elif rain_in >= 0.10 %}
              {% set base = base - 2 %}
            {% endif %}
            {% set minutes = [1, [base | int(10), 25] | min] | max %}
            {% set ns.m = dict(ns.m, **{z.label: minutes}) %}
          {% endfor %}
          {{ ns.m | to_json }}
        llm_zone_map: >-
          {{ baseline_zone_map }}
    - variables:
        llm_http_status: "per_zone_mode"
        llm_raw_snippet: "no global all-zone LLM call — LLM runs per zone below"
        llm_raw_text: ""
        llm_clean_text: ""
        simulate_summary: >-
          {% set raw = llm_zone_map | default(none) %}
          {% if raw is mapping %}
            {% set m = raw %}
          {% elif raw is string and raw | trim | length > 0 %}
            {% set m = raw | trim | from_json(default={}) %}
          {% else %}
            {% set m = {} %}
          {% endif %}
          {% set ns = namespace(lines=[]) %}
          {% for z in zones %}
            {% set lm = m.get(z.label, 0) | int(0) %}
            {% set rm = 0 if lm < 2 else ([2, [lm, 25] | min] | max) %}
            {% set ns.lines = ns.lines + [
              z.label ~ ': ' ~ rm ~ (' min (skipped)' if rm < 1 else (' min → ' ~ z.entity_id))
            ] %}
          {% endfor %}
          {% if m | length < (zone_count | int(1)) %}
          WARNING: baseline map incomplete ({{ m | length }} zones, expected {{ zone_count }}). Check ecowitt_temp / forecast_short inputs.
          {% endif %}
          Harness deterministic estimate (operator reference only; not sent to the LLM):
          {{ ns.lines | join('\n') }}
        irrigation_start_summary: >-
          {% set raw = llm_zone_map | default(none) %}
          {% if raw is mapping %}
            {% set m = raw %}
          {% elif raw is string and raw | trim | length > 0 %}
            {% set m = raw | trim | from_json(default={}) %}
          {% else %}
            {% set m = {} %}
          {% endif %}
          {% set ns = namespace(lines=[], sec=0) %}
          {% for z in zones %}
            {% set lm = m.get(z.label, 0) | int(0) %}
            {% set rm = 0 if lm < 2 else ([2, [lm, 25] | min] | max) %}
            {% set ns.lines = ns.lines + [('• ' ~ z.label ~ ' — ' ~ rm ~ (' min (skipped)' if rm < 1 else ' min'))] %}
            {% set ns.sec = ns.sec + ((rm * 60 + 55) if rm > 0 else 0) %}
          {% endfor %}
          {% set h = (ns.sec // 3600) | int %}
          {% set mi = ((ns.sec % 3600) // 60) | int %}
          {% if h > 0 %}
            {% set eta = (h ~ ' hr ' ~ mi ~ ' min') %}
          {% elif mi > 0 %}
            {% set eta = (mi ~ ' min') %}
          {% else %}
            {% set eta = 'under a minute' %}
          {% endif %}
          Dusk watering has started. Below is each station's planned run time, then a rough total duration.

          {{ ns.lines | join('\n') }}

          Estimated wall time about {{ eta }} total (watering plus ~55 seconds after each station so the hub can switch valves safely).

          Any unavailable valve will be skipped — actual runtime may be shorter.
        pending_zones: >-
          {% set idx = start_index_clamped | int(1) %}
          {% set ns = namespace(items=[]) %}
          {% for z in zones %}
            {% if loop.index >= idx %}
              {% set ns.items = ns.items + [z] %}
            {% endif %}
          {% endfor %}
          {{ ns.items }}
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ simulate_mode }}"
        sequence:
        - action: input_text.set_value
          data:
            entity_id: '{{ cfg_simulate_report }}'
            value: ""
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ not simulate_mode }}"
        sequence:
        - variables:
            run_config_json: >-
              {{ {
                'zones': zones_configured,
                'latitude': cfg_latitude,
                'longitude': cfg_longitude,
                'timezone': cfg_timezone,
                'garden_temperature_sensor': cfg_garden_temperature_sensor,
                'garden_dewpoint_sensor': cfg_garden_dewpoint_sensor,
                'history_sensors': cfg_history_sensors,
                'weather_entity': cfg_weather_entity,
                'precipitation_sensor': cfg_precipitation_sensor,
                'soil_moisture_legend': cfg_soil_moisture_legend,
                'model_override': model_override_trimmed,
                'in_progress_boolean': cfg_in_progress,
                'next_index_number': cfg_next_index,
                'active_run_id_text': cfg_active_run_id,
                'simulate_report_text': cfg_simulate_report,
                'run_config_snapshot_sensor': cfg_snapshot_sensor,
                'mqtt_snapshot_topic': cfg_mqtt_topic,
                'default_llm_model_helper': cfg_llm_helper,
                'default_llm_model': cfg_default_llm,
                'openweathermap_api_key_helper': cfg_owm_key_helper,
                'ha_api_token_helper': cfg_ha_token_helper,
                'llm_api_key_helper': cfg_llm_key_helper,
                'llm_api_url': cfg_llm_url,
                'ha_api_base_url': cfg_ha_api_base,
                'irrigation_start_service': cfg_irrigation_start,
                'irrigation_stop_service': cfg_irrigation_stop,
                'max_zone_index': cfg_max_zone_index
              } | to_json }}
        - action: mqtt.publish
          data:
            topic: '{{ cfg_mqtt_topic }}'
            payload: "{{ run_config_json }}"
            retain: true
        - action: input_boolean.turn_on
          data:
            entity_id: '{{ cfg_in_progress }}'
        - action: input_text.set_value
          data:
            entity_id: '{{ cfg_active_run_id }}'
            value: "{{ now().timestamp() | int }}"
        - action: input_number.set_value
          data:
            entity_id: '{{ cfg_next_index }}'
            value: "{{ start_index_clamped | int(1) }}"
        - action: persistent_notification.create
          data:
            title: Sequential watering started
            message: >-
              {% if start_index_clamped | int(1) > 1 %}
              Resuming interrupted run at zone index {{ start_index_clamped }}.

              {% endif %}
              {{ irrigation_start_summary }}
    - repeat:
        for_each: '{{ pending_zones }}'
        sequence:
        - variables:
            zone_label: '{{ repeat.item.label }}'
            zone_entity: '{{ repeat.item.entity_id }}'
            zone_watering_entity: >-
              {% set v = repeat.item.entity_id %}
              {% if v[:6] != 'valve.' %}
                {{ v }}
              {% else %}
                {% set s = 'switch.' ~ (v | replace('valve.', '')) %}
                {% if states(v) != 'unavailable' %}
                  {{ v }}
                {% elif states(s) != 'unavailable' %}
                  {{ s }}
                {% else %}
                  {{ v }}
                {% endif %}
              {% endif %}
            zone_index: '{{ (start_index_clamped | int(1) + repeat.index - 1) | int }}'
            zone_soil_for_llm: >-
              {% set pri = repeat.item.soil_sensor | default('', true) | trim %}
              {% set sec = repeat.item.soil_sensor_secondary | default('', true) | trim %}
              {% set plants = repeat.item.plant_profile | default('', true) | lower %}
              {% set hist = sensor_history_24h_for_llm | default('{}', true) | trim | from_json(default={}) %}
              {% set hist_ents = hist.entities | default([]) %}
              {% set ns = namespace(probes=[]) %}
              {% for eid in [pri, sec] if eid | length > 0 %}
                {% set raw = states(eid) %}
                {% set pct = raw | float(none) if raw not in ['unknown', 'unavailable', 'none', ''] else none %}
                {% set row = namespace(min24=none, max24=none, first=none, last=none) %}
                {% for e in hist_ents %}
                  {% if e.entity_id == eid %}
                    {% set row.min24 = e.min_numeric %}
                    {% set row.max24 = e.max_numeric %}
                    {% set row.first = e.first %}
                    {% set row.last = e.last %}
                  {% endif %}
                {% endfor %}
                {% set ns.probes = ns.probes + [{
                  'entity_id': eid,
                  'moisture_pct_now': pct,
                  'moisture_pct_24h_min': row.min24,
                  'moisture_pct_24h_max': row.max24,
                  'moisture_pct_24h_first': row.first,
                  'moisture_pct_24h_last': row.last
                }] %}
              {% endfor %}
              {% if ns.probes | length == 0 %}
                {{ {'has_soil_probe': false} | to_json }}
              {% else %}
                {% set guide = 'Soil probe is the PRIMARY decision signal (0-100%, higher = wetter). Probe overrides rainfall and deficit estimates when moisture is adequate for plant_profile. Generic bands: very dry <=25% add 3-6 min; dry 26-35% add 1-3 min; comfortable 36-55% REPLY 0 unless plant target says otherwise; moist 56-65% REPLY 0 when within plant target max; wet >=66% always REPLY 0.' %}
                {% if plants | regex_search('hosta|mint|flower') %}
                  {% set guide = guide ~ ' Ornamentals (hosta/mint/flowers): target ~40-68%. REPLY 0 when every probe is 40-68%.' %}
                {% endif %}
                {% if plants | regex_search('tomato') %}
                  {% set guide = guide ~ ' Tomatoes: target ~45-62%. REPLY 0 when every probe is 45-62%. Add only when any probe <32%.' %}
                {% endif %}
                {% if plants | regex_search('pepper|kale|basil|parsley') %}
                  {% set guide = guide ~ ' Peppers/kale/herbs: target ~40-65%. REPLY 0 when every probe is 40-65%. Add only when any probe <30%.' %}
                {% endif %}
                {% if plants | regex_search('zucchini|eggplant|pea') %}
                  {% set guide = guide ~ ' Zucchini/eggplant/peas: with multiple probes use the drier reading for add decisions but REPLY 0 if ANY probe >=66% or if wettest probe >=60%. REPLY 0 when driest probe is 48-59% and wettest <60%. Add only when driest probe <30%.' %}
                {% endif %}
                {% if plants | regex_search('corn') %}
                  {% set guide = guide ~ ' Corn: target ~45-62%. REPLY 0 when every probe is 45-62%. Add only when any probe <32%.' %}
                {% endif %}
                {% if garden_heat_temp_f | float(0) >= 75 %}
                  {% set guide = guide ~ ' Hot weather (garden heat signal >=75F): surface dries faster than probe depth — only add minutes when probes read dry for the plant type; reply 0 when probe >=68% or heavy rain is forecast.' %}
                {% endif %}
                {{ {
                  'has_soil_probe': true,
                  'plant_profile': repeat.item.plant_profile,
                  'adjustment_guide': guide,
                  'probes': ns.probes
                } | to_json }}
              {% endif %}
            zone_has_soil_probe: >-
              {{ (zone_soil_for_llm | trim | from_json(default={})).get('has_soil_probe', false) | bool }}
            zone_probe_skip_recommendation: >-
              {% set ctx = zone_soil_for_llm | trim | from_json(default={}) %}
