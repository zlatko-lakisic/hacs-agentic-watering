                  {% if fv is not none %}
                    {% set vals.list = vals.list + [fv] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {% if vals.list | length == 0 %}
              {{ 'unknown probe values' }}
              {% else %}
              {% set mn = vals.list | min %}
              {% set mx = vals.list | max %}
              {% if mx >= 66 %}
              {{ 'SKIP — reply 0: wettest probe ' ~ (mx | round(1)) ~ '% >= 66% (saturated).' }}
              {% elif plants | regex_search('tomato') and mn >= 45 and mx <= 62 %}
              {{ 'SKIP — reply 0: tomato probe(s) ' ~ (mn | round(1)) ~ '-' ~ (mx | round(1)) ~ '% within target 45-62%.' }}
              {% elif plants | regex_search('pepper|kale|basil|parsley') and mn >= 40 and mx <= 65 %}
              {{ 'SKIP — reply 0: pepper/herb probe(s) ' ~ (mn | round(1)) ~ '-' ~ (mx | round(1)) ~ '% within target 40-65%.' }}
              {% elif plants | regex_search('hosta|mint|flower') and mn >= 40 and mx <= 68 %}
              {{ 'SKIP — reply 0: ornamental probe(s) ' ~ (mn | round(1)) ~ '-' ~ (mx | round(1)) ~ '% within target 40-68%.' }}
              {% elif plants | regex_search('zucchini|eggplant|pea') and mx >= 60 %}
              {{ 'SKIP — reply 0: wettest probe ' ~ (mx | round(1)) ~ '% >= 60%; driest ' ~ (mn | round(1)) ~ '% — zone wet enough.' }}
              {% elif plants | regex_search('zucchini|eggplant|pea') and mn >= 48 and mx < 60 %}
              {{ 'SKIP — reply 0: driest probe ' ~ (mn | round(1)) ~ '% in comfortable 48-59% range.' }}
              {% elif plants | regex_search('corn') and mn >= 45 and mx <= 62 %}
              {{ 'SKIP — reply 0: corn probe(s) within target 45-62%.' }}
              {% elif mn >= 36 and mx <= 55 %}
              {{ 'SKIP — reply 0: all probe(s) ' ~ (mn | round(1)) ~ '-' ~ (mx | round(1)) ~ '% in comfortable 36-55% range.' }}
              {% elif mn >= 56 and mx <= 65 %}
              {{ 'SKIP — reply 0: probe(s) moist but adequate at ' ~ (mn | round(1)) ~ '-' ~ (mx | round(1)) ~ '%.' }}
              {% else %}
              {{ 'WATER OK — driest probe ' ~ (mn | round(1)) ~ '%, wettest ' ~ (mx | round(1)) ~ '%; add minutes only if below plant minimum in adjustment_guide.' }}
              {% endif %}
