# Generic REST actions for script.ai_sequential_watering (URLs and auth passed per call).
rest_command:
  openweathermap_5day_forecast:
    url: >-
      https://api.openweathermap.org/data/2.5/forecast?lat={{ latitude }}&lon={{ longitude }}&units=imperial&appid={{ api_key }}
    method: GET
    verify_ssl: true
    timeout: 30

  open_meteo_precipitation_past_24h:
    url: >-
      https://api.open-meteo.com/v1/forecast?latitude={{ latitude }}&longitude={{ longitude }}&hourly=precipitation&past_hours=72&forecast_hours=0&timezone={{ timezone | urlencode }}
    method: GET
    verify_ssl: true
    timeout: 30

  homeassistant_history_garden_24h:
    url: >-
      {{ ha_api_base_url }}/api/history/period/{{ (now() - timedelta(hours=24)).isoformat() }}?minimal_response=true&filter_entity_id={{ history_entity_ids }}
    method: GET
    headers:
      Authorization: "{{ authorization }}"
      Content-Type: application/json
    verify_ssl: false
    timeout: 45

  homeassistant_history_irrigation_valves:
    url: >-
      {{ ha_api_base_url }}/api/history/period/{{ (now() - timedelta(days=30)).isoformat() }}?minimal_response=true&filter_entity_id={{ valve_entity_ids }}
    method: GET
    headers:
      Authorization: "{{ authorization }}"
      Content-Type: application/json
    verify_ssl: false
    timeout: 90

  ollama_chat_completions:
    url: "{{ llm_api_url }}"
    method: POST
    headers:
      Authorization: >-
        {% set h = llm_api_key_helper | default('', true) | trim %}
        {% set t = states(h) | default('', true) | trim if h | length > 0 else '' %}
        {% if t in ['', 'unknown', 'unavailable', 'none'] %}
        {% elif (t | lower)[0:7] == 'bearer ' %}
        {{ t }}
        {% else %}
        Bearer {{ t }}
        {% endif %}
      Content-Type: application/json
    content_type: application/json
    timeout: 86400
    payload: "{{ payload }}"
