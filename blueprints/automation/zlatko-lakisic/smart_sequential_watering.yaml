blueprint:
  name: Smart sequential watering
  description: |
    Configure irrigation zones, location, sensors, API helpers, and runtime state helpers.
    The linked watering script performs OpenWeather, Open-Meteo, Recorder history, LLM, and
    irrigation service calls using only the parameters you provide here.

    Requires the Agentic Watering HACS integration packages (rest_command + script) in
    configuration.yaml, plus a site-specific instance package (helpers, MQTT snapshot, resume).
    See https://github.com/zlatko-lakisic/hacs-agentic-watering
  domain: automation
  homeassistant:
    min_version: '2024.6.0'
  input:
    zones:
      name: Irrigation zones
      description: >-
        Ordered list of zones to water sequentially. Each zone needs a name and valve entity.
        Soil moisture and weather are read live at runtime.
      selector:
        object:
          label_field: label
          description_field: plant_profile
          multiple: true
          fields:
            label:
              label: Zone name
              required: true
              selector:
                text:
            entity_id:
              label: Valve entity
              required: true
              selector:
                entity:
                  filter:
                    - domain: valve
                    - domain: switch
            zone_history_sensor:
              label: Zone history sensor (optional, integration-specific last-run)
              selector:
                entity:
                  filter:
                    - domain: sensor
            area_sqm:
              label: Area m² (optional)
              selector:
                number:
                  min: 0
                  max: 500
                  step: 0.1
                  mode: box
            sun_exposure:
              label: Sun exposure
              selector:
                text:
            plant_profile:
              label: Plant profile
              selector:
                text:
            irrigation_hardware:
              label: Irrigation hardware
              selector:
                text:
            estimated_flow_gpm:
              label: Estimated flow (GPM)
              selector:
                text:
            notes:
              label: Notes
              selector:
                text:
                  multiline: true
            soil_sensor:
              label: Primary soil moisture sensor (optional)
              selector:
                entity:
                  filter:
                    - domain: sensor
            soil_sensor_secondary:
              label: Secondary soil moisture sensor (optional)
              selector:
                entity:
                  filter:
                    - domain: sensor
    latitude:
      name: Latitude
      description: Coordinates for OpenWeatherMap and Open-Meteo.
      selector:
        number:
          min: -90
          max: 90
          step: "any"
          mode: box
    longitude:
      name: Longitude
      selector:
        number:
          min: -180
          max: 180
          step: "any"
          mode: box
    timezone:
      name: Timezone
      description: IANA timezone for Open-Meteo (e.g. America/New_York).
      selector:
        text:
    garden_temperature_sensor:
      name: Garden temperature sensor
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature
            - domain: sensor
    garden_dewpoint_sensor:
      name: Garden dew point sensor
      selector:
        entity:
          filter:
            - domain: sensor
    history_sensors:
      name: Recorder history sensors (24h)
      description: Zone soil sensors are merged automatically if not listed here.
      selector:
        entity:
          multiple: true
          filter:
            - domain: sensor
    weather_entity:
      name: Hourly weather entity (optional)
      selector:
        entity:
          filter:
            - domain: weather
    precipitation_sensor:
      name: Current precipitation rate sensor (optional)
      selector:
        entity:
          filter:
            - domain: sensor
    soil_moisture_legend:
      name: Soil probe legend for LLM
      selector:
        text:
          multiline: true
    minutes_after_event:
      name: Minutes after sun event
      default: 0
      selector:
        number:
          min: 0
          max: 180
          step: 1
          mode: box
          unit_of_measurement: min
    sun_event:
      name: Sun trigger event
      default: sunset
      selector:
        select:
          options:
            - sunset
            - sunrise
    limit_to_season:
      name: Limit to date window
      default: false
      selector:
        boolean: {}
    season_start_month:
      name: Season start month
      default: 1
      selector:
        number:
          min: 1
          max: 12
          step: 1
          mode: box
    season_start_day:
      name: Season start day
      default: 1
      selector:
        number:
          min: 1
          max: 31
          step: 1
          mode: box
    season_end_month:
      name: Season end month
      default: 12
      selector:
        number:
          min: 1
          max: 12
          step: 1
          mode: box
    season_end_day:
      name: Season end day
      default: 31
      selector:
        number:
          min: 1
          max: 31
          step: 1
          mode: box
    watering_script:
      name: Watering script
      selector:
        entity:
          filter:
            - domain: script
    model_override:
      name: LLM model override
      description: Optional model for this run only. Leave empty to use the default LLM model helper or text fallback.
      default: ""
      selector:
        text:
    in_progress_boolean:
      name: In-progress helper (input_boolean)
      selector:
        entity:
          filter:
            - domain: input_boolean
    next_index_number:
      name: Next zone index helper (input_number)
      selector:
        entity:
          filter:
            - domain: input_number
    active_run_id_text:
      name: Active run id helper (input_text)
      selector:
        entity:
          filter:
            - domain: input_text
    simulate_report_text:
      name: Simulate report helper (input_text, optional)
      selector:
        entity:
          filter:
            - domain: input_text
    run_config_snapshot_sensor:
      name: Run config snapshot sensor
      selector:
        entity:
          filter:
            - domain: sensor
    mqtt_snapshot_topic:
      name: MQTT snapshot topic
      selector:
        text:
    default_llm_model_helper:
      name: Default LLM model helper (input_select, optional)
      selector:
        entity:
          filter:
            - domain: input_select
    default_llm_model:
      name: Default LLM model text fallback
      default: ""
      selector:
        text:
    openweathermap_api_key_helper:
      name: OpenWeatherMap API key helper (input_text)
      selector:
        entity:
          filter:
            - domain: input_text
    ha_api_token_helper:
      name: HA Recorder API token helper (input_text)
      selector:
        entity:
          filter:
            - domain: input_text
    llm_api_key_helper:
      name: LLM API key helper (input_text)
      selector:
        entity:
          filter:
            - domain: input_text
    llm_api_url:
      name: LLM chat completions URL
      selector:
        text:
    ha_api_base_url:
      name: Home Assistant API base URL
      selector:
        text:
    irrigation_start_service:
      name: Irrigation start service
      description: domain.service (e.g. bhyve.start_watering)
      selector:
        text:
    irrigation_stop_service:
      name: Irrigation stop service
      selector:
        text:
    max_zone_index:
      name: Max zone index
      default: 16
      selector:
        number:
          min: 1
          max: 64
          step: 1
          mode: box

mode: single
variables:
  limit_to_season: !input limit_to_season
  season_start_month: !input season_start_month
  season_start_day: !input season_start_day
  season_end_month: !input season_end_month
  season_end_day: !input season_end_day
triggers:
  - trigger: sun
    event: !input sun_event
conditions:
  - condition: template
    value_template: >-
      {% if not limit_to_season %}
        true
      {% else %}
        {% set m = now().month %}
        {% set d = now().day %}
        {% set start_ord = (season_start_month | int(1)) * 100 + (season_start_day | int(1)) %}
        {% set end_ord = (season_end_month | int(12)) * 100 + (season_end_day | int(31)) %}
        {% set cur_ord = m * 100 + d %}
        {% if start_ord <= end_ord %}
          {{ cur_ord >= start_ord and cur_ord <= end_ord }}
        {% else %}
          {{ cur_ord >= start_ord or cur_ord <= end_ord }}
        {% endif %}
      {% endif %}
actions:
  - delay:
      minutes: !input minutes_after_event
  - action: !input watering_script
    data:
      zones: !input zones
      latitude: !input latitude
      longitude: !input longitude
      timezone: !input timezone
      garden_temperature_sensor: !input garden_temperature_sensor
      garden_dewpoint_sensor: !input garden_dewpoint_sensor
      history_sensors: !input history_sensors
      weather_entity: !input weather_entity
      precipitation_sensor: !input precipitation_sensor
      soil_moisture_legend: !input soil_moisture_legend
      model_override: !input model_override
      in_progress_boolean: !input in_progress_boolean
      next_index_number: !input next_index_number
      active_run_id_text: !input active_run_id_text
      simulate_report_text: !input simulate_report_text
      run_config_snapshot_sensor: !input run_config_snapshot_sensor
      mqtt_snapshot_topic: !input mqtt_snapshot_topic
      default_llm_model_helper: !input default_llm_model_helper
      default_llm_model: !input default_llm_model
      openweathermap_api_key_helper: !input openweathermap_api_key_helper
      ha_api_token_helper: !input ha_api_token_helper
      llm_api_key_helper: !input llm_api_key_helper
      llm_api_url: !input llm_api_url
      ha_api_base_url: !input ha_api_base_url
      irrigation_start_service: !input irrigation_start_service
      irrigation_stop_service: !input irrigation_stop_service
      max_zone_index: !input max_zone_index
